disabled_rules:
  - trailing_whitespace
  - todo

opt_in_rules:
  - empty_count
  - explicit_init
  - force_unwrapping
  - redundant_nil_coalescing
  - switch_case_on_newline
  - yoda_condition

included:
  - Sources
  - Tests

excluded:
  - .build
  - Resources

line_length:
  warning: 140
  error: 160

function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

cyclomatic_complexity:
  warning: 10
  error: 20

identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - id
    - x
    - y

reporter: "xcode"
