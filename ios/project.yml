name: AIHeadshot
options:
  bundleIdPrefix: com.ai-headshot
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
targets:
  AIHeadshot:
    type: application
    platform: iOS
    sources:
      - path: Sources/AIHeadshot
        excludes:
          - Resources/**
    resources:
      - Sources/AIHeadshot/Resources/Assets.xcassets
      - Sources/AIHeadshot/Resources/Config/AppInfo.plist
      - PrivacyInfo.xcprivacy
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ai-headshot.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        OTHER_SWIFT_FLAGS: "-enable-experimental-feature StrictConcurrency"
        CODE_SIGN_STYLE: "Automatic"
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: "PL88RN3ADW"
    scheme:
      testTargets:
        - AIHeadshotTests
  AIHeadshotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/AIHeadshotTests
    dependencies:
      - target: AIHeadshot
